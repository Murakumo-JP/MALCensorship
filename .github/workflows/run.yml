name: R18 Generator List

on:
  schedule:
    - cron: "0 0 */15 * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npm start

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Добавляем конкретные файлы из папки data
          # Если файлов много, можно использовать: git add data/*.css
          git add data/R18Anime.css
          git add data/R18Manga.css
          
          # Проверяем, есть ли изменения, чтобы не создавать пустой коммит
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update Censorship List (Auto)"
          git push origin main